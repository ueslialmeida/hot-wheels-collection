name: CI/CD Pipeline

on:
  push:
    branches: ["*"] # Roda em todas as branches (trabalho e main)
  pull_request:
    branches: ["main"] # Roda ao abrir PR para a main

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "eyLocalAnonKey" # Pode ser a chave padrão do Supabase Local

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar Supabase Local (Banco Efêmero)
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Start Supabase containers
        # O 'supabase start' sobe o Docker, aplica migrações e o seed.sql
        run: supabase start

      - name: Executar Cypress (E2E)
        # O start-server-and-test sobe o Next.js e aguarda a porta 3000 estar pronta
        run: npx start-server-and-test dev http://127.0.0.1:3000 'npx cypress run'
        env:
          # Garante que o Cypress use as credenciais do banco local criado no step anterior
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Upload de screenshots/vídeos em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-results
          path: |
            cypress/screenshots
            cypress/videos

  # --- JOB 2: DEPLOY EM PRODUÇÃO ---
  deploy:
    runs-on: ubuntu-latest
    needs: test # CRÍTICO: O deploy só inicia se o job 'test' terminar com sucesso
    
    # Condição: Só faz o deploy se o push for na branch main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy para Vercel (ou seu serviço de hosting)
        # Substitua pelo comando de deploy do seu provedor
        run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes