name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # --- JOB 1: RUN AUTOMATED TESTS LOCALLY ---
  test:
    runs-on: ubuntu-latest

    # Ignores documentation changes to avoid unnecessary test runs, but runs on all other pushes and PRs
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'docs/'))
    
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      TEST_BASE_URL: ${{ vars.TEST_BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase start
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Start Supabase containers
        # Runs migrations and seed
        run: supabase start

      - name: Cypress (E2E)
        run: npx start-server-and-test dev ${{ env.TEST_BASE_URL }} 'npx cypress run --record --key ${{ secrets.CYPRESS_RECORD_KEY }}'

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: |
            test/screenshots
            test/videos

  # --- JOB 2: DEPLOY TO PRODUCTION ---
  deploy:
    runs-on: ubuntu-latest
    needs: test # Don't deploy if tests fail
    
    # Only deploys main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY_PROD }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Pulls Vercel environment variables to ensure the build has access to necessary secrets
      - name: Pull Vercel Environment Information
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Compiles the project and prepares the build artifacts for deployment to Vercel
      - name: Build Project Artifacts
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploys the vuild to Vercel
      - name: Deploy Project Artifacts to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}