name: CI/CD Pipeline

on:
  push:
    branches-ignore: ["docs/**"]
  pull_request:
    branches: ["main"]

jobs:
  # --- JOB 1: RUN AUTOMATED TESTS LOCALLY ---
  test:
    runs-on: ubuntu-latest
    
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      TEST_BASE_URL: ${{ vars.TEST_BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Supabase start
        uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Start Supabase containers
        # Runs migrations and seed
        run: supabase start

      - name: Cypress (E2E)
        run: npx start-server-and-test dev ${{ env.TEST_BASE_URL }} 'npx cypress run'

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: |
            test/screenshots
            test/videos

  # --- JOB 2: DEPLOY TO PRODUCTION ---
  deploy:
    runs-on: ubuntu-latest
    needs: test # If tests fail, this job will be skipped
    
    # Only deploy when pushing to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy para Vercel (ou seu serviço de hosting)
        # Substitua pelo comando de deploy do seu provedor
        run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes